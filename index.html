<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Nocturna 🕯️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Paleta Dark Academia Intensa */
  --bg-dark: #120f0d;             /* Fondo general ultra oscuro */
  --wood-dark: #1a1411;           /* Madera de fondo de la app */
  --parchment: #d9c3a3;           /* Papel pergamino claro texturado */
  --parchment-muted: #bda585;     /* Pergamino para subtítulos */
  --leather: #281e19;             /* Tarjetas oscuras empotradas */
  --gold: #c39b62;                /* Detalles dorados/bronce gastados */
  --gold-muted: #8c6f46;          /* Dorados secundarios */
  --text-dark: #231b15;           /* Texto sobre pergamino */
  --text-light: #dcd1c4;          /* Texto sobre fondos oscuros */
  --text-muted: #8b7d70;          /* Texto secundario atenuado */
  --border-dark: rgba(195, 155, 98, 0.15);
}

body { 
  font-family: 'Playfair Display', Georgia, serif; 
  background-color: var(--bg-dark); 
  /* Simulación de textura de escritorio de madera vieja */
  background-image: radial-gradient(circle at 50% 50%, rgba(26,20,17,0.3) 0%, rgba(12,10,9,1) 100%);
  color: var(--text-light); 
  min-height: 100vh; 
}

/* Contenedor principal de la app ajustable */
#app-screen { 
  display:none; 
  max-width: 480px; 
  margin: 0 auto; 
  padding-bottom: 90px; 
  background: var(--wood-dark);
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  min-height: 100vh;
  border-left: 1px solid rgba(195,155,98,0.1);
  border-right: 1px solid rgba(195,155,98,0.1);
}

/* TOP BAR: Exacto a la imágen */
.top-bar { 
  background: #15110e; 
  padding: 20px 24px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  position: sticky; 
  top: 0; 
  z-index: 50; 
  border-bottom: 1px solid rgba(195, 155, 98, 0.08); 
}
.top-bar-title { 
  font-family: 'Cinzel', serif;
  font-size: 21px; 
  font-weight: 500; 
  color: var(--text-light); 
  letter-spacing: 1px;
  text-transform: lowercase;
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 auto; /* Centrado como en la captura */
}
.top-bar-icon {
  color: var(--gold);
  cursor: pointer;
  background: none;
  border: none;
  font-size: 20px;
}

/* PANTALLAS */
.screen { display: none; padding: 20px; }
.screen.active { display: block; }

/* TARJETA DE BIENVENIDA (Pergamino central roto/antiguo) */
.welcome-parchment {
  background: #e5d3b3;
  background-image: radial-gradient(circle at 50% 50%, #ecdcb9 0%, #d8c29d 100%);
  border-radius: 4px;
  box-shadow: inset 0 0 20px rgba(40,30,20,0.2), 0 10px 25px rgba(0,0,0,0.5);
  padding: 32px 24px;
  text-align: center;
  color: var(--text-dark);
  margin-bottom: 24px;
  position: relative;
  border: 1px solid #cbbb9a;
}
.welcome-parchment::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(13c, 11f, 70, 0.15);
  pointer-events: none;
}
.welcome-parchment h2 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 28px;
  font-weight: 500;
  font-style: italic;
  margin-bottom: 6px;
}
.welcome-parchment p {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 15px;
  color: #4a3b2c;
  margin-bottom: 14px;
}
/* Floritura decorativa inferior antigua */
.flourish {
  font-size: 14px;
  color: #725c43;
  letter-spacing: -2px;
  user-select: none;
}

/* SECCIÓN PROGRESO Y ESTADÍSTICAS (Bloques empotrados de cuero oscuro) */
.stat-row { display: flex; gap: 14px; margin-bottom: 24px; }

.leather-card {
  flex: 1;
  background: #171210;
  border: 1px solid rgba(195, 155, 98, 0.08);
  border-radius: 8px;
  padding: 16px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.3);
  position: relative;
}
.leather-card-title {
  font-size: 12px;
  font-family: 'Playfair Display', serif;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.badge-tbr {
  background: rgba(140, 111, 70, 0.25);
  color: var(--gold);
  border: 1px solid rgba(195,155,98,0.2);
  padding: 1px 8px;
  border-radius: 3px;
  font-size: 11px;
}
.progress-digits {
  font-family: 'Cinzel', serif;
  font-size: 24px;
  color: var(--text-light);
  font-weight: 600;
  margin-bottom: 4px;
}
.progress-subtext {
  font-size: 11px;
  color: var(--text-muted);
}
/* Barra de progreso minimalista lineal */
.academia-bar-bg {
  background: #251d19;
  height: 4px;
  border-radius: 2px;
  margin-top: 12px;
  overflow: hidden;
}
.academia-bar-fill {
  background: var(--gold-muted);
  height: 100%;
  width: 0%;
  transition: width 0.6s ease;
}

/* Gráfico simulado de estadísticas de la imagen */
.mini-chart {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 38px;
  margin-top: 6px;
}
.mini-bar {
  flex: 1;
  background: rgba(140, 111, 70, 0.15);
  border-top: 2px solid var(--gold-muted);
  height: 20%;
}
.mini-bar:nth-child(2) { height: 40%; }
.mini-bar:nth-child(3) { height: 35%; }
.mini-bar:nth-child(4) { height: 70%; }
.mini-bar:nth-child(5) { height: 85%; }
.mini-bar:nth-child(6) { height: 60%; }

/* ETIQUETAS DE SECCIÓN */
.section-label { 
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 15px; 
  font-weight: 500; 
  color: var(--parchment-muted); 
  margin-bottom: 14px; 
  margin-top: 10px;
  border-bottom: 1px solid rgba(195,155,98,0.1);
  padding-bottom: 4px;
}

/* LISTA DE LECTURAS ACTUALES (Estilo Pergamino Grande apilado con Clip) */
.academia-book-container {
  background: #ded0b6;
  border-radius: 3px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  padding: 4px;
  position: relative;
}
/* Detalle de clip metálico opcional simulador */
.academia-book-container::after {
  content: '📎';
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 20px;
  opacity: 0.6;
  transform: rotate(45deg);
  pointer-events: none;
}

.book-card { 
  display: flex; 
  gap: 16px; 
  background: transparent;
  border-bottom: 1px dashed rgba(40,30,20,0.15); 
  padding: 16px 12px; 
  cursor: pointer; 
  transition: background 0.2s;
}
.book-card:last-child { border-bottom: none; }
.book-card:hover { background: rgba(40,30,20,0.03); }

.book-cover { 
  width: 56px; 
  height: 78px; 
  border-radius: 2px; 
  flex-shrink: 0; 
  background: #2a201b; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 9px; 
  color: var(--parchment); 
  text-align: center; 
  padding: 4px; 
  box-shadow: 3px 4px 8px rgba(0,0,0,0.4);
}
.book-cover img { width: 100%; height: 100%; object-fit: cover; }

.book-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.book-title { 
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 16px; 
  font-weight: 600; 
  color: var(--text-dark); 
  white-space: nowrap; 
  overflow: hidden; 
  text-overflow: ellipsis; 
}
.book-author { 
  font-size: 13px; 
  color: #5c4b3a; 
  margin-top: 2px; 
  font-family: 'Playfair Display', serif;
}
.book-stars { font-size: 11px; color: #a47e4b; margin-top: 6px; letter-spacing: 1px; }

/* Progreso numérico y barra interna del libro */
.book-progress-wrapper {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.book-progress-bar-bg {
  flex: 1;
  background: rgba(40, 30, 20, 0.1);
  height: 3px;
  border-radius: 1px;
}
.book-progress-bar-fill {
  background: #5c452d;
  height: 100%;
}
.book-progress-pct {
  font-size: 11px;
  font-family: 'Playfair Display', serif;
  color: var(--text-dark);
  font-weight: 600;
}

/* BOTTOM TAB BAR: Estilo Cuero Oscuro con Dorados */
.tab-bar { 
  position: fixed; 
  bottom: 0; 
  left: 50%; 
  transform: translateX(-50%); 
  width: 100%; 
  max-width: 480px; 
  display: flex; 
  background: #14100e; 
  border-top: 1px solid rgba(195, 155, 98, 0.1); 
  z-index: 100; 
  box-shadow: 0 -5px 25px rgba(0,0,0,0.6);
  padding-bottom: env(safe-area-inset-bottom, 10px);
}
.tab { 
  flex: 1; 
  padding: 12px 4px; 
  text-align: center; 
  cursor: pointer; 
  border: none; 
  background: none; 
  font-family: 'Playfair Display', serif;
  font-size: 11px; 
  color: var(--text-muted); 
  transition: all 0.2s; 
}
.tab.active { color: var(--gold); font-weight: 500; }
.tab svg { 
  display: block; 
  margin: 0 auto 4px; 
  width: 20px; 
  height: 20px; 
  stroke: currentColor; 
  fill: none; 
  stroke-width: 1.5; 
}

/* Botón flotante o central elegante "+" */
.tab-center-btn {
  background: var(--gold-muted) !important;
  color: #14100e !important;
  border-radius: 50%;
  width: 42px;
  height: 42px;
  margin-top: -12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  border: 2px solid #14100e !important;
}

/* AUTHENTICATION SCREEN */
#auth-screen { 
  min-height: 100vh; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  padding: 24px; 
}
.auth-logo { font-size: 40px; margin-bottom: 12px; color: var(--gold); }
.auth-title { 
  font-family: 'Cinzel', serif; 
  font-size: 30px; 
  font-weight: 500; 
  color: var(--gold); 
  letter-spacing: 2px; 
}
.auth-sub { 
  font-family: 'Playfair Display', serif; 
  font-style: italic; 
  font-size: 14px; 
  color: var(--text-muted); 
  margin-bottom: 32px; 
}
