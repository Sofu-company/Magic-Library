<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Nocturna 🕯️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-dark: #120f0d;
  --wood-dark: #1a1411;
  --parchment: #ded0b6;
  --parchment-light: #ecdcb9;
  --leather: #171210;
  --gold: #c39b62;
  --gold-muted: #8c6f46;
  --text-dark: #231b15;
  --text-light: #dcd1c4;
  --text-muted: #8b7d70;
  --border-dark: rgba(195, 155, 98, 0.15);
}

body { 
  font-family: 'Playfair Display', Georgia, serif; 
  background-color: var(--bg-dark); 
  background-image: radial-gradient(circle at 50% 50%, rgba(26,20,17,0.3) 0%, rgba(12,10,9,1) 100%);
  color: var(--text-light); 
  min-height: 100vh; 
}

#auth-screen { 
  min-height: 100vh; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  padding: 24px; 
}
.auth-logo { font-size: 44px; margin-bottom: 8px; color: var(--gold); }
.auth-title { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 500; color: var(--gold); letter-spacing: 2px; text-align: center; }
.auth-sub { font-style: italic; font-size: 13px; color: var(--text-muted); margin-bottom: 24px; text-align: center; }
.auth-card { background: var(--leather); border-radius: 8px; border: 1px solid var(--border-dark); padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }

.auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #2e241f; }
.auth-tab { background: none; border: none; color: var(--text-muted); padding: 10px; flex: 1; cursor: pointer; font-family: 'Cinzel', serif; font-size: 13px; }
.auth-tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }
.form-group input, .form-group select, .form-group textarea, .modal-input, .modal-select { 
  width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #2e241f; background: #0f0c0a; font-family: inherit; font-size: 14px; color: var(--text-light); outline: none; 
}
.form-group input:focus, .modal-input:focus { border-color: var(--gold); }

#app-screen { 
  display: none; max-width: 480px; margin: 0 auto; padding-bottom: 90px; background: var(--wood-dark); box-shadow: 0 0 40px rgba(0,0,0,0.9); min-height: 100vh; position: relative;
}

.top-bar { 
  background: #15110e; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(195, 155, 98, 0.08); 
}
.top-bar-title { font-family: 'Cinzel', serif; font-size: 19px; color: var(--text-light); letter-spacing: 1px; text-transform: lowercase; margin: 0 auto; }
.top-bar-icon { color: var(--gold); background: none; border: none; font-size: 18px; cursor: pointer; }

.screen { display: none; padding: 20px; }
.screen.active { display: block; }
